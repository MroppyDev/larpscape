<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create an account — Larpscape</title>
  <meta name="description" content="Create a free Larpscape account and step into Cantorne — 24 skills, quests, guilds, and a player economy, all in your browser." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@500;600;700&family=Alegreya:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="/assets/register-DNLRgrJb.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/auth-BqGd6f3R.js">
  <link rel="stylesheet" crossorigin href="/assets/auth-C3_bTczM.css">
</head>
<body class="auth-page">
  <a class="skip-link" href="#auth-main">Skip to content</a>

  <div class="auth-wrap">
    <a class="auth-mast" href="/" aria-label="Larpscape home">
      <svg viewBox="0 0 560 96" role="img" aria-label="Larpscape">
        <defs>
          <linearGradient id="goldtxt-auth" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffefb0" />
            <stop offset=".45" stop-color="#f1c85a" />
            <stop offset=".75" stop-color="#c8922a" />
            <stop offset="1" stop-color="#9a6a1c" />
          </linearGradient>
        </defs>
        <text x="50%" y="72" text-anchor="middle" class="wordmark-text" fill="url(#goldtxt-auth)" stroke="#171008" stroke-width="6" paint-order="stroke">LARPSCAPE</text>
      </svg>
    </a>

    <main id="auth-main">
      <section class="panel auth-panel" aria-labelledby="auth-h">
        <h1 class="panel-h" id="auth-h">Create an account</h1>
        <p class="auth-sub">Sign your name into the song. It&rsquo;s free, and the gate guard is friendly.</p>

        <form id="auth-form" novalidate>
          <p class="form-error" id="form-error" role="alert" hidden></p>

          <label class="field">
            <span class="field-label">Username</span>
            <input id="username" name="username" type="text" autocomplete="username"
                   autocapitalize="off" spellcheck="false" maxlength="12" required autofocus />
            <span class="field-hint">3&ndash;12 letters and numbers — this is the name the realm will know you by.</span>
          </label>

          <label class="field">
            <span class="field-label">Password</span>
            <input id="password" name="password" type="password" autocomplete="new-password"
                   maxlength="64" required />
            <span class="field-hint">4&ndash;64 characters.</span>
          </label>

          <label class="field">
            <span class="field-label">Confirm password</span>
            <input id="password2" name="password2" type="password" autocomplete="new-password"
                   maxlength="64" required />
          </label>

          <button class="btn btn-primary btn-block auth-submit" id="auth-submit" type="submit">Create account</button>
        </form>

        <p class="auth-alt">Already an adventurer? <a href="/login" data-keep-query>Log in</a></p>
        <p class="auth-alt"><small>One account is all you need &mdash; it opens the game, the <a href="https://forum.larpscape.net/">forums</a>, and the hiscores alike.</small></p>
      </section>
      <p class="auth-foot"><a href="/">&larr; Back to larpscape.net</a></p>
    </main>
  </div>

</body>
</html>
