<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Larpscape</title>
  <meta name="description" content="Log in to your Larpscape account — the free browser realm in the world of Cantorne." />
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@500;600;700&family=Alegreya:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="auth-page">
  <a class="skip-link" href="#auth-main">Skip to content</a>

  <div class="auth-wrap">
    <a class="auth-mast" href="/" aria-label="Larpscape home">
      <svg viewBox="0 0 560 96" role="img" aria-label="Larpscape">
        <defs>
          <linearGradient id="goldtxt-auth" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#ffefb0" />
            <stop offset=".45" stop-color="#f1c85a" />
            <stop offset=".75" stop-color="#c8922a" />
            <stop offset="1" stop-color="#9a6a1c" />
          </linearGradient>
        </defs>
        <text x="50%" y="72" text-anchor="middle" class="wordmark-text" fill="url(#goldtxt-auth)" stroke="#171008" stroke-width="6" paint-order="stroke">LARPSCAPE</text>
      </svg>
    </a>

    <main id="auth-main">
      <section class="panel auth-panel" aria-labelledby="auth-h">
        <h1 class="panel-h" id="auth-h">Log in</h1>
        <p class="auth-sub">Welcome back to Cantorne. The song kept your place.</p>

        <form id="auth-form" novalidate>
          <p class="form-error" id="form-error" role="alert" hidden></p>

          <label class="field">
            <span class="field-label">Username</span>
            <input id="username" name="username" type="text" autocomplete="username"
                   autocapitalize="off" spellcheck="false" maxlength="12" required autofocus />
          </label>

          <label class="field">
            <span class="field-label">Password</span>
            <input id="password" name="password" type="password" autocomplete="current-password"
                   maxlength="64" required />
          </label>

          <button class="btn btn-primary btn-block auth-submit" id="auth-submit" type="submit">Log in</button>
        </form>

        <p class="auth-alt">New to the realm? <a href="/register" data-keep-query>Create an account</a></p>
        <p class="auth-alt"><small>Forgotten your password? The Offnote keeps no copies and neither do we &mdash; ask a warden on the <a href="https://forum.larpscape.net/">forums</a>.</small></p>
      </section>
      <p class="auth-foot"><a href="/">&larr; Back to larpscape.net</a></p>
    </main>
  </div>

  <script type="module" src="/src/login.ts"></script>
</body>
</html>
