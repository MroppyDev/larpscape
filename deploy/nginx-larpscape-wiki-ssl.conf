# HTTPS wiki vhost — enabled by deploy/enable-wiki-ssl.sh after certbot succeeds.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name wiki.larpscape.net;

    ssl_certificate     /etc/letsencrypt/live/wiki.larpscape.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wiki.larpscape.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers (server scope) — audit infra #1 / web #1,#2 ---
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    root /opt/larpscape/dist-wiki;
    index index.html;

    location /api/ge/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
