# HTTPS trade vhost — enabled by deploy/enable-trade-ssl.sh after certbot succeeds.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name trade.larpscape.net;

    ssl_certificate     /etc/letsencrypt/live/trade.larpscape.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trade.larpscape.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/larpscape/dist-trade;
    index index.html;

    # --- Security headers (server scope) — audit infra #1 / web #1,#2 ---
    # Re-declared in the /assets/ and =/index.html locations below (they set
    # their own add_header, which replaces the inherited ones). CSP omitted —
    # the trade client uses WS; ship Report-Only first, then enforce.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # Same-origin API calls go to the game server
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # Hashed build assets are immutable
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        try_files $uri =404;
    }

    # index.html must never be cached so deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-cache";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
