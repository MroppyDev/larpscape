# Game client — play.larpscape.net
# HTTP always works; HTTPS block is appended once certbot has issued a cert.
# After DNS points here: bash /opt/larpscape/deploy/bootstrap-play-ssl.sh
# (one-time manual step; update.sh re-enables HTTPS on later deploys automatically)

server {
    listen 80;
    listen [::]:80;
    server_name play.larpscape.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # Cache the bundled soundfont (~32 MB) — immutable asset, big win for return visits.
    location = /soundfont.sf2 {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
