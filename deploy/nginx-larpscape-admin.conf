# Admin console — admin.larpscape.net only (never the apex domain)
server {
    listen 80;
    listen [::]:80;
    server_name admin.larpscape.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name admin.larpscape.net;

    ssl_certificate     /etc/letsencrypt/live/admin.larpscape.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.larpscape.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
