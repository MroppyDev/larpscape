# Admin console — admin.larpscape.net only (never the apex domain)
server {
    listen 80;
    listen [::]:80;
    server_name admin.larpscape.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name admin.larpscape.net;

    ssl_certificate     /etc/letsencrypt/live/admin.larpscape.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.larpscape.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers (server scope) ---
    # Admin is first-party only, so it gets a strict CSP with no third-party
    # origins. DENY + frame-ancestors 'none' kill clickjacking on the
    # ban/publish/restart controls (audit infra #1).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy    "default-src 'self'; img-src 'self' data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; object-src 'none'" always;

    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}
