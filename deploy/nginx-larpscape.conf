# Marketing homepage — larpscape.net + www (game moved to play.larpscape.net)
# Serves the static homepage build from /opt/larpscape/dist-home, but keeps the
# game's API/WS/asset paths proxied to :8080 so old cached game clients keep working.
server {
    listen 80;
    listen [::]:80;
    server_name larpscape.net www.larpscape.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name larpscape.net www.larpscape.net;

    ssl_certificate     /etc/letsencrypt/live/larpscape.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/larpscape.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/larpscape/dist-home;
    index index.html;

    # The game now lives at play.larpscape.net
    location = /play {
        return 301 https://play.larpscape.net$is_args$args;
    }
    location /play/ {
        return 301 https://play.larpscape.net$is_args$args;
    }

    # --- Legacy game-client paths (old cached index.html keeps working) ---

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # Cache the bundled soundfont (~32 MB) — immutable asset, big win for return visits.
    location = /soundfont.sf2 {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Old game clients stream music from the game server's public dir.
    location /music/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # Hashed bundles: serve homepage assets from disk; anything not in dist-home
    # is an old game bundle hash — fall through to the game server.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri @game;
    }
    location @game {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Wiki mirror — works when router DNS hasn't picked up wiki.larpscape.net yet ---
    location = /wiki {
        return 301 /wiki/;
    }
    location /wiki/ {
        alias /opt/larpscape/dist-wiki-path/;
        try_files $uri $uri/ /wiki/index.html;
    }
    location = /wiki/index.html {
        alias /opt/larpscape/dist-wiki-path/index.html;
    }

    # --- Homepage static build ---
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
