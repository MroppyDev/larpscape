# Forum — forum.larpscape.net (server-rendered by the game server at /forum)
# HTTP always works; HTTPS block is appended once certbot has issued a cert.
# After DNS points here: bash /opt/larpscape/deploy/bootstrap-forum-ssl.sh
# (one-time manual step; update.sh re-enables HTTPS on later deploys automatically)

server {
    listen 80;
    listen [::]:80;
    server_name forum.larpscape.net;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Bare host lands on the forum index (server renders at /forum).
    location = / {
        return 302 /forum;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
