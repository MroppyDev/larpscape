# HTTPS play vhost — enabled by deploy/enable-play-ssl.sh after certbot succeeds.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name play.larpscape.net;

    ssl_certificate     /etc/letsencrypt/live/play.larpscape.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/play.larpscape.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # --- Security headers (server scope) — audit infra #1 / web #1,#2 ---
    # Re-declared in any location below that sets its own add_header (nginx
    # REPLACES inherited add_header once a location adds one). CSP omitted here:
    # the game client uses WS + inline bootstrap and needs per-app tuning — ship
    # Content-Security-Policy-Report-Only first, then enforce.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # Cache the bundled soundfont (~32 MB) — immutable asset, big win for return visits.
    location = /soundfont.sf2 {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        # Re-declare security headers — this location's add_header replaces the
        # inherited server-scope ones.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
