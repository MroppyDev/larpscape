# HTTPS play vhost — enabled by deploy/enable-play-ssl.sh after certbot succeeds.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name play.larpscape.net;

    ssl_certificate     /etc/letsencrypt/live/play.larpscape.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/play.larpscape.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # Cache the bundled soundfont (~32 MB) — immutable asset, big win for return visits.
    location = /soundfont.sf2 {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
