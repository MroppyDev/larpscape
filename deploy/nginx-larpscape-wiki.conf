# Larpscape Wiki — wiki.larpscape.net
# HTTP always works; HTTPS block is included once certbot has issued a cert.
# After DNS points here: certbot certonly --webroot -w /var/www/certbot -d wiki.larpscape.net
# Then run: bash /opt/larpscape/deploy/enable-wiki-ssl.sh

server {
    listen 80;
    listen [::]:80;
    server_name wiki.larpscape.net;

    root /opt/larpscape/dist-wiki;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Proxy GE prices to the game server
    location /api/ge/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
