# Larpscape Wiki — wiki.larpscape.net (static SPA + GE price proxy)
server {
    listen 80;
    listen [::]:80;
    server_name wiki.larpscape.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name wiki.larpscape.net;

    ssl_certificate     /etc/letsencrypt/live/wiki.larpscape.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wiki.larpscape.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/larpscape/dist-wiki;
    index index.html;

    # Live GE prices from the game server
    location /api/ge/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
