# Aldgate Exchange trade site — trade.larpscape.net (static site from /opt/larpscape/dist-trade)
# HTTP always works; HTTPS block is appended once certbot has issued a cert.
# After DNS points here: bash /opt/larpscape/deploy/bootstrap-trade-ssl.sh
# (one-time manual step; update.sh re-enables HTTPS on later deploys automatically)

server {
    listen 80;
    listen [::]:80;
    server_name trade.larpscape.net;

    root /opt/larpscape/dist-trade;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Same-origin API calls go to the game server
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    # Hashed build assets are immutable
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # index.html must never be cached so deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
